<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Downlink | Liquid Glass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* 
  Downlink Final Edition
  Design: Liquid Glassmorphism
*/

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;min-height:100%;-webkit-font-smoothing:antialiased;overflow-x:hidden;font-family:'DM Mono',monospace;}

:root {
  --bg: #05050a;
  --fg: #f8f8ff;
  --fg2: rgba(248,248,255,0.5);
  --orb-op: 0.8;
  --glass-bg: rgba(255,255,255,0.04);
  --glass-sm: rgba(255,255,255,0.06);
  --glass-border: rgba(255,255,255,0.14);
  --glass-shine: rgba(255,255,255,0.2);
  --glass-shadow: rgba(0,0,0,0.6);
  --sb-bg: rgba(8,8,16,0.85);
  --sb-border: rgba(255,255,255,0.1);
  --panel-bg: rgba(10,10,20,0.88);
  --btn-bg: #ffffff;
  --btn-fg: #05050a;
  --sep: rgba(255,255,255,0.08);
  --tab-idle: rgba(255,255,255,0.05);
  --tab-border: rgba(255,255,255,0.12);
  --tab-text: rgba(248,248,255,0.6);
  --pill-idle: rgba(255,255,255,0.05);
  --drop-hover: rgba(236,72,153,0.15);
  --drop-hover-fg: #f472b6;
  --tgl-off: rgba(255,255,255,0.15);
  --accent: #8b5cf6;
}

html:not(.dark) {
  --bg: #ffffff;
  --fg: #1a1a1a;
  --fg2: rgba(26,26,26,0.5);
  --orb-op: 0.45;
  --glass-bg: rgba(255,255,255,0.65);
  --glass-sm: rgba(255,255,255,0.75);
  --glass-border: rgba(255,255,255,0.9);
  --glass-shine: rgba(255,255,255,1);
  --glass-shadow: rgba(0,0,0,0.05);
  --sb-bg: rgba(255,255,255,0.92);
  --sb-border: rgba(0,0,0,0.08);
  --panel-bg: rgba(255,255,255,0.85);
  --btn-bg: #1a1a1a;
  --btn-fg: #ffffff;
  --sep: rgba(0,0,0,0.06);
  --tab-idle: rgba(0,0,0,0.04);
  --tab-border: rgba(0,0,0,0.08);
  --tab-text: rgba(26,26,26,0.6);
  --pill-idle: rgba(0,0,0,0.04);
  --drop-hover: rgba(139,92,246,0.1);
  --drop-hover-fg: #7c3aed;
  --tgl-off: rgba(0,0,0,0.1);
  --accent: #7c3aed;
}

body { background: var(--bg); color: var(--fg); transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s; }

/* Background Orbs */
.bg-orbs { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.orb {
  position: absolute; border-radius: 50%; filter: blur(100px);
  animation: orb-drift var(--dur, 20s) ease-in-out infinite alternate;
  opacity: var(--orb-op); transition: opacity 0.8s;
}
.orb1 { width: 600px; height: 600px; top: -150px; left: -150px; --dur: 25s; background: radial-gradient(circle, #6366f1 0%, #4338ca 60%, transparent 100%); }
.orb2 { width: 500px; height: 500px; top: 25%; right: -100px; --dur: 20s; animation-direction: alternate-reverse; background: radial-gradient(circle, #ec4899 0%, #be185d 60%, transparent 100%); }
.orb3 { width: 550px; height: 550px; bottom: -150px; left: 20%; --dur: 28s; background: radial-gradient(circle, #06b6d4 0%, #0891b2 60%, transparent 100%); }
.orb4 { width: 400px; height: 400px; bottom: 15%; right: 10%; --dur: 18s; animation-direction: alternate-reverse; background: radial-gradient(circle, #10b981 0%, #059669 60%, transparent 100%); }

@keyframes orb-drift {
  0% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(40px, -30px) scale(1.05); }
  100% { transform: translate(-20px, 40px) scale(0.95); }
}

/* Glassmorphism Classes */
.lg {
  position: relative; background: var(--glass-bg);
  backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%);
  border: 1px solid var(--glass-border);
  box-shadow: 0 4px 24px var(--glass-shadow), inset 0 1px 0 var(--glass-shine);
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.lg::after {
  content: ''; position: absolute; inset: 0; border-radius: inherit; pointer-events: none;
  background: linear-gradient(110deg, transparent 35%, rgba(255,255,255,0.08) 50%, transparent 65%);
  background-size: 200% 100%; animation: shimmer 6s infinite linear;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* Main Layout */
.page {
  position: relative; z-index: 1; min-height: 100dvh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 100px 24px;
}

.headline {
  font-family: 'Playfair Display', serif; font-weight: 700;
  font-size: clamp(48px, 12vw, 100px); color: var(--fg); text-align: center;
  line-height: 0.95; letter-spacing: -0.05em; margin-bottom: 40px;
  animation: liquid-rise 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) both;
}
@keyframes liquid-rise { from { opacity: 0; transform: translateY(40px) scale(0.9); filter: blur(10px); } to { opacity: 1; transform: none; filter: blur(0); } }

/* Navigation Bar */
.nav {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  width: min(calc(100% - 40px), 650px); height: 60px; border-radius: 100px;
  display: flex; align-items: center; justify-content: space-between; padding: 0 12px 0 24px;
  z-index: 1000;
}
.brand {
  font-family: 'Playfair Display', serif; font-weight: 700; font-size: 18px;
  color: var(--fg); letter-spacing: -0.02em; display: flex; align-items: center; gap: 10px;
  user-select: none; pointer-events: none; /* Brand only, no reload */
}
.nav-r { display: flex; align-items: center; gap: 8px; position: relative; }

.nbtn {
  width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  background: transparent; color: var(--fg);
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  -webkit-tap-highlight-color: transparent;
}
.nbtn:hover { background: rgba(255,255,255,0.1); transform: scale(1.1); }
html:not(.dark) .nbtn:hover { background: rgba(0,0,0,0.05); }
.nbtn:active { transform: scale(0.9); }
.nbtn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }

/* Dropdown */
.pdrop {
  position: absolute; top: 65px; right: 0; border-radius: 24px; padding: 8px; width: 180px;
  display: none; flex-direction: column; gap: 4px; z-index: 1010;
  animation: spring-pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.pdrop.on { display: flex; }
@keyframes spring-pop { from { opacity: 0; transform: scale(0.8) translateY(-10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.pdrop button {
  background: none; border: none; text-align: left; padding: 12px 18px; border-radius: 100px;
  font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--fg);
  cursor: pointer; transition: all 0.2s; width: 100%;
}
.pdrop button:hover { background: var(--drop-hover); color: var(--drop-hover-fg); }

/* Search Capsule */
.cap-wrap { width: 100%; max-width: 650px; margin-bottom: 24px; animation: liquid-rise 0.8s 0.1s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
.capsule { height: 72px; border-radius: 100px; display: flex; align-items: center; overflow: hidden; }
.cap-ico { flex-shrink: 0; padding-left: 28px; padding-right: 16px; opacity: 0.4; }
.cap-ico svg { width: 20px; height: 20px; stroke: var(--fg); fill: none; stroke-width: 2.5; }
.url-in {
  flex: 1; background: transparent; border: none; outline: none; color: var(--fg);
  font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 400; padding: 0 10px;
}
.url-in::placeholder { color: var(--fg2); }
.process-btn {
  height: 100%; padding: 0 36px; background: var(--btn-bg); color: var(--btn-fg);
  border: none; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 700;
  letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.process-btn:hover { opacity: 0.9; transform: scale(1.02); }
.process-btn:active { transform: scale(0.95); }

/* Picker & Tabs */
.picker { width: 100%; max-width: 650px; border-radius: 32px; padding: 32px 24px; animation: liquid-rise 0.8s 0.2s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
.tabs { display: flex; gap: 12px; margin-bottom: 24px; justify-content: center; }
.tab {
  height: 44px; padding: 0 28px; border-radius: 100px; background: var(--tab-idle);
  border: 1px solid var(--tab-border); color: var(--tab-text);
  font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.3s;
}
.tab.on { background: var(--btn-bg); color: var(--btn-fg); border-color: transparent; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }

.pills { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
.pill {
  padding: 10px 24px; border-radius: 100px; background: var(--pill-idle); border: 1px solid var(--tab-border);
  color: var(--tab-text); font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.3s;
}
.pill.on { background: var(--btn-bg); color: var(--btn-fg); border-color: transparent; }

/* Sidebar */
.sbov { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(12px); z-index: 1100; display: none; }
.sbov.on { display: block; animation: fade-in 0.3s ease; }
@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

.sb {
  position: fixed; top: 0; left: 0; bottom: 0; width: 300px;
  background: var(--sb-bg); backdrop-filter: blur(60px) saturate(200%);
  border-right: 1px solid var(--sb-border); z-index: 1101;
  transform: translateX(-100%); transition: transform 0.5s cubic-bezier(0.32, 0, 0.14, 1);
  display: flex; flex-direction: column;
}
.sb.on { transform: translateX(0); }
.sb-hd { padding: 80px 24px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--sep); }
.sb-title { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: var(--fg); }
.sb-close { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--glass-border); background: var(--glass-sm); color: var(--fg); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
.sb-close:hover { background: rgba(255,255,255,0.1); transform: rotate(90deg); }
.sb-body { flex: 1; padding: 32px 20px; display: flex; flex-direction: column; gap: 16px; }

/* Theme Toggle in Sidebar */
.theme-row {
  display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 64px;
  border-radius: 20px; background: var(--glass-sm); border: 1px solid var(--glass-border);
}
.theme-label { display: flex; align-items: center; gap: 14px; font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 700; color: var(--fg); }
.tgl {
  width: 56px; height: 32px; border-radius: 100px; background: var(--tgl-off); border: none;
  position: relative; cursor: pointer; transition: background 0.4s;
}
.tgl::after {
  content: ''; position: absolute; top: 4px; left: 4px; width: 24px; height: 24px;
  border-radius: 50%; background: #fff; transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.tgl.on { background: var(--accent); }
.tgl.on::after { transform: translateX(24px); }

/* Dev Toggle (Bottom Left) */
.dev-toggle {
  position: fixed; bottom: 30px; left: 30px; z-index: 1000; width: 60px; height: 60px;
  border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--fg); transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.dev-toggle:hover { transform: scale(1.1) rotate(5deg); }
.dev-toggle:active { transform: scale(0.9); }
.dev-toggle svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; position: absolute; transition: all 0.4s; }
.dev-toggle .d-desktop { opacity: 0; transform: scale(0.5) rotate(-45deg); }
.dev-toggle.desk .d-mobile { opacity: 0; transform: scale(0.5) rotate(45deg); }
.dev-toggle.desk .d-desktop { opacity: 1; transform: scale(1) rotate(0); }

/* Mini Browser Panel */
.panel {
  position: fixed; z-index: 1200; border-radius: 28px; overflow: hidden;
  display: none; flex-direction: column; width: 380px; height: 600px;
  animation: panel-in 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}
.panel.open { display: flex; }
@keyframes panel-in { from { opacity: 0; transform: translateY(30px) scale(0.95); filter: blur(10px); } to { opacity: 1; transform: none; filter: blur(0); } }

.pbar {
  height: 50px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--sep); cursor: grab;
}
.pbar:active { cursor: grabbing; }
.pbtns { display: flex; gap: 8px; }
.pbtn {
  width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--glass-sm);
  color: var(--fg); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s;
}
.pbtn:hover { background: rgba(255,255,255,0.1); }
.pbtn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; }
.ifr-wrap { flex: 1; background: #fff; position: relative; }
iframe { width: 100%; height: 100%; border: none; }

/* Transitions */
.mobile-frame { width: 375px !important; height: 667px !important; border-radius: 40px; border: 8px solid #1a1a1a; }
.desktop-frame { width: 80% !important; height: 70% !important; border-radius: 20px; }

/* Copy Utility */
.copy-btn {
  position: fixed; bottom: 30px; right: 30px; padding: 12px 24px; border-radius: 100px;
  background: var(--btn-bg); color: var(--btn-fg); border: none; cursor: pointer;
  font-family: 'DM Mono', monospace; font-weight: 700; font-size: 12px; z-index: 1000;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: all 0.3s;
}
.copy-btn:hover { transform: translateY(-4px); box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
.copy-btn:active { transform: scale(0.95); }

</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="orb orb4"></div>
</div>

<nav class="nav lg">
  <div class="brand">Downlink</div>
  <div class="nav-r">
    <button class="nbtn" onclick="toggleDrop(event)" title="Options">
      <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    </button>
    <button class="nbtn" onclick="openSB()" title="Menu">
      <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    
    <div class="pdrop lg" id="pdrop">
      <button onclick="alert('Library Coming Soon')">My Library</button>
      <button onclick="alert('Settings Coming Soon')">Preferences</button>
      <button onclick="window.location.reload()">Reset App</button>
    </div>
  </div>
</nav>

<main class="page">
  <h1 class="headline">Fast. Liquid.<br>Beautiful.</h1>
  
  <div class="cap-wrap">
    <div class="capsule lg">
      <div class="cap-ico">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <input type="text" class="url-in" id="urlIn" placeholder="Paste link here..." spellcheck="false">
      <button class="process-btn" onclick="processUrl()">Go</button>
    </div>
  </div>

  <div class="picker lg">
    <div class="tabs">
      <button class="tab on" id="tvid" onclick="setMode('video')">Video</button>
      <button class="tab" id="taud" onclick="setMode('audio')">Audio</button>
    </div>
    <div class="pills" id="pills">
      <!-- Generated by JS -->
    </div>
  </div>
</main>

<button class="dev-toggle lg" id="devTgl" onclick="toggleBrowser()" title="Toggle Browser View">
  <svg class="d-mobile" viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
  <svg class="d-desktop" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
</button>

<div class="sbov" id="sbov" onclick="closeSB()"></div>
<div class="sb" id="sb">
  <div class="sb-hd">
    <div class="sb-title">Menu</div>
    <button class="sb-close" onclick="closeSB()">
      <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="sb-body">
    <div class="theme-row">
      <div class="theme-label">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        Dark Mode
      </div>
      <button class="tgl on" id="darkTgl" onclick="toggleTheme()"></button>
    </div>
  </div>
</div>

<div class="panel lg" id="bpanel">
  <div class="pbar" id="bbar">
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="width:12px;height:12px;border-radius:50%;background:#ff5f56;"></div>
      <div style="width:12px;height:12px;border-radius:50%;background:#ffbd2e;"></div>
      <div style="width:12px;height:12px;border-radius:50%;background:#27c93f;"></div>
    </div>
    <div class="pbtns">
      <button class="pbtn" onclick="toggleSize()" title="Switch View">
        <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      </button>
      <button class="pbtn" onclick="closeBrowser()" title="Close">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>
  <div class="ifr-wrap">
    <iframe id="brif" src="about:blank"></iframe>
  </div>
</div>

<button class="copy-btn" onclick="copyFullCode()">Copy Code</button>

<script>
'use strict';

let mode = 'video';
let isDark = true;
let isBrowserOpen = false;
let isDesktopView = false;

document.addEventListener('DOMContentLoaded', () => {
  renderPills();
  
  // Theme initialization
  const savedTheme = localStorage.getItem('downlink_theme');
  if (savedTheme === 'light') {
    isDark = false;
    document.documentElement.classList.remove('dark');
    document.getElementById('darkTgl').classList.remove('on');
  }
  
  // Close dropdown on outside click
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.nav-r')) {
      document.getElementById('pdrop').classList.remove('on');
    }
  });

  // Make panel draggable
  makeDraggable(document.getElementById('bbar'), document.getElementById('bpanel'));
});

function toggleTheme() {
  isDark = !isDark;
  document.documentElement.classList.toggle('dark', isDark);
  document.getElementById('darkTgl').classList.toggle('on', isDark);
  localStorage.setItem('downlink_theme', isDark ? 'dark' : 'light');
}

function toggleDrop(e) {
  e.stopPropagation();
  document.getElementById('pdrop').classList.toggle('on');
}

function openSB() {
  document.getElementById('sb').classList.add('on');
  document.getElementById('sbov').classList.add('on');
}

function closeSB() {
  document.getElementById('sb').classList.remove('on');
  document.getElementById('sbov').classList.remove('on');
}

function setMode(m) {
  mode = m;
  document.getElementById('tvid').classList.toggle('on', m === 'video');
  document.getElementById('taud').classList.toggle('on', m === 'audio');
  renderPills();
}

function renderPills() {
  const container = document.getElementById('pills');
  const options = mode === 'video' 
    ? ['4K Ultra', '1080p HD', '720p', '480p'] 
    : ['MP3 320kbps', 'FLAC Lossless', 'WAV', 'AAC'];
  
  container.innerHTML = options.map((opt, i) => `
    <button class="pill ${i === 1 ? 'on' : ''}" onclick="selectPill(this)">${opt}</button>
  `).join('');
}

function selectPill(btn) {
  btn.parentElement.querySelectorAll('.pill').forEach(p => p.classList.remove('on'));
  btn.classList.add('on');
}

function processUrl() {
  const url = document.getElementById('urlIn').value.trim();
  if (!url) {
    alert('Please paste a valid URL');
    return;
  }
  // Logic for processing would go here
  alert('Processing: ' + url);
}

// Browser Panel Logic
function toggleBrowser() {
  const panel = document.getElementById('bpanel');
  const btn = document.getElementById('devTgl');
  const iframe = document.getElementById('brif');
  
  if (!isBrowserOpen) {
    isBrowserOpen = true;
    panel.classList.add('open');
    if (iframe.src === 'about:blank' || !iframe.src) {
      iframe.src = 'https://www.google.com/search?q=Downlink+App';
    }
    // Initial position
    panel.style.top = '100px';
    panel.style.right = '30px';
    panel.style.left = 'auto';
  } else {
    // If open, toggle between mobile/desktop icon style
    isDesktopView = !isDesktopView;
    btn.classList.toggle('desk', isDesktopView);
    toggleSize();
  }
}

function toggleSize() {
  const panel = document.getElementById('bpanel');
  const btn = document.getElementById('devTgl');
  
  if (isDesktopView) {
    panel.classList.remove('mobile-frame');
    panel.classList.add('desktop-frame');
    btn.classList.add('desk');
  } else {
    panel.classList.remove('desktop-frame');
    panel.classList.add('mobile-frame');
    btn.classList.remove('desk');
  }
}

function closeBrowser() {
  isBrowserOpen = false;
  document.getElementById('bpanel').classList.remove('open');
}

// Draggable Utility
function makeDraggable(handle, element) {
  let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
  handle.onmousedown = dragMouseDown;

  function dragMouseDown(e) {
    e.preventDefault();
    pos3 = e.clientX;
    pos4 = e.clientY;
    document.onmouseup = closeDragElement;
    document.onmousemove = elementDrag;
  }

  function elementDrag(e) {
    e.preventDefault();
    pos1 = pos3 - e.clientX;
    pos2 = pos4 - e.clientY;
    pos3 = e.clientX;
    pos4 = e.clientY;
    element.style.top = (element.offsetTop - pos2) + "px";
    element.style.left = (element.offsetLeft - pos1) + "px";
    element.style.right = 'auto';
  }

  function closeDragElement() {
    document.onmouseup = null;
    document.onmousemove = null;
  }
}

function copyFullCode() {
  const code = document.documentElement.outerHTML;
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.querySelector('.copy-btn');
    const oldText = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = oldText, 2000);
  });
}
</script>
