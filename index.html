<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Downlink</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;min-height:100%;-webkit-font-smoothing:antialiased;overflow-x:hidden;font-family:'DM Mono',monospace;}

:root{
  --bg:#07070f;--fg:#f0f0f7;--fg2:rgba(240,240,247,.45);--orb-op:.75;
  --glass-bg:rgba(255,255,255,.07);--glass-sm:rgba(255,255,255,.09);
  --glass-border:rgba(255,255,255,.17);--glass-shine:rgba(255,255,255,.22);
  --glass-shadow:rgba(0,0,0,.45);--sb-bg:rgba(10,8,22,.82);
  --sb-border:rgba(255,255,255,.12);--panel-bg:rgba(10,8,22,.84);
  --modal-bg:rgba(10,8,22,.88);--btn-bg:rgba(255,255,255,.9);--btn-fg:#07070f;
  --inv-bg:#07070f;--inv-fg:#f0f0f7;--sep:rgba(255,255,255,.09);
  --pbtn-bg:rgba(255,255,255,.08);--pbtn-fg:rgba(255,255,255,.7);
  --ph-color:rgba(240,240,247,.28);--tab-idle:rgba(255,255,255,.07);
  --tab-border:rgba(255,255,255,.13);--tab-text:rgba(240,240,247,.45);
  --pill-idle:rgba(255,255,255,.07);--drop-hover:rgba(236,72,153,.18);
  --drop-hover-fg:#f472b6;--tgl-off:rgba(255,255,255,.16);
  --loading-bg:rgba(7,7,15,.85);
}
html:not(.dark){
  --bg:#f3f0ff;--fg:#12101e;--fg2:rgba(18,16,30,.45);--orb-op:.55;
  --glass-bg:rgba(255,255,255,.42);--glass-sm:rgba(255,255,255,.52);
  --glass-border:rgba(255,255,255,.78);--glass-shine:rgba(255,255,255,.92);
  --glass-shadow:rgba(60,40,100,.10);--sb-bg:rgba(243,240,255,.88);
  --sb-border:rgba(255,255,255,.72);--panel-bg:rgba(243,240,255,.78);
  --modal-bg:rgba(243,240,255,.90);--btn-bg:#12101e;--btn-fg:#f3f0ff;
  --inv-bg:#f3f0ff;--inv-fg:#12101e;--sep:rgba(18,16,30,.07);
  --pbtn-bg:rgba(18,16,30,.07);--pbtn-fg:rgba(18,16,30,.55);
  --ph-color:rgba(18,16,30,.28);--tab-idle:rgba(255,255,255,.35);
  --tab-border:rgba(255,255,255,.65);--tab-text:rgba(18,16,30,.4);
  --pill-idle:rgba(255,255,255,.35);--drop-hover:rgba(139,92,246,.12);
  --drop-hover-fg:#7c3aed;--tgl-off:rgba(18,16,30,.15);
  --loading-bg:rgba(243,240,255,.88);
}

body{background:var(--bg);color:var(--fg);transition:background .4s,color .3s;}

.bg-orbs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.orb{
  position:absolute;border-radius:50%;filter:blur(80px);
  animation:orb-drift var(--dur,18s) ease-in-out infinite alternate;
  opacity:var(--orb-op);transition:opacity .5s;
}
.orb1{width:560px;height:560px;top:-100px;left:-140px;--dur:22s;background:radial-gradient(circle,#5b21b6 0%,#4338ca 55%,transparent 100%);}
.orb2{width:440px;height:440px;top:28%;right:-90px;--dur:18s;animation-direction:alternate-reverse;background:radial-gradient(circle,#9d174d 0%,#db2777 55%,transparent 100%);}
.orb3{width:490px;height:490px;bottom:-110px;left:18%;--dur:25s;background:radial-gradient(circle,#075985 0%,#0891b2 55%,transparent 100%);}
.orb4{width:340px;height:340px;bottom:18%;right:8%;--dur:16s;animation-direction:alternate-reverse;background:radial-gradient(circle,#065f46 0%,#059669 55%,transparent 100%);}
html:not(.dark) .orb1{background:radial-gradient(circle,rgba(139,92,246,.5) 0%,rgba(99,102,241,.35) 55%,transparent 100%);}
html:not(.dark) .orb2{background:radial-gradient(circle,rgba(219,39,119,.45) 0%,rgba(236,72,153,.3) 55%,transparent 100%);}
html:not(.dark) .orb3{background:radial-gradient(circle,rgba(14,165,233,.42) 0%,rgba(6,182,212,.28) 55%,transparent 100%);}
html:not(.dark) .orb4{background:radial-gradient(circle,rgba(5,150,105,.38) 0%,rgba(16,185,129,.25) 55%,transparent 100%);}
@keyframes orb-drift{
  0%{transform:translate(0,0) scale(1);}30%{transform:translate(36px,-28px) scale(1.04);}
  65%{transform:translate(-18px,38px) scale(.97);}100%{transform:translate(28px,18px) scale(1.03);}
}

.lg{
  position:relative;background:var(--glass-bg);
  backdrop-filter:blur(52px) saturate(200%) brightness(1.04);
  -webkit-backdrop-filter:blur(52px) saturate(200%) brightness(1.04);
  border:1px solid var(--glass-border);
  box-shadow:0 2px 0 0 var(--glass-shine) inset,0 0 0 .5px rgba(255,255,255,.06) inset,0 -1px 0 0 rgba(0,0,0,.08) inset,0 18px 52px var(--glass-shadow),0 4px 14px rgba(0,0,0,.18);
}
.lg::after{
  content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:linear-gradient(108deg,transparent 32%,rgba(255,255,255,.065) 50%,transparent 68%);
  background-size:220% 100%;animation:shimmer 5s ease-in-out infinite;
}
@keyframes shimmer{0%{background-position:220% 0;}100%{background-position:-220% 0;}}

.lg-sm{
  background:var(--glass-sm);
  backdrop-filter:blur(32px) saturate(180%);-webkit-backdrop-filter:blur(32px) saturate(180%);
  border:1px solid var(--glass-border);
  box-shadow:0 2px 0 0 var(--glass-shine) inset,0 8px 28px var(--glass-shadow);
}

@keyframes rise{from{opacity:0;transform:translateY(20px) scale(.95);}to{opacity:1;transform:none;}}
@keyframes spring-pop{0%{opacity:0;transform:scale(.8);}55%{transform:scale(1.05);}80%{transform:scale(.98);}100%{opacity:1;transform:scale(1);}}
@keyframes fade-in{from{opacity:0;}to{opacity:1;}}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}

.page{
  position:relative;z-index:1;min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:84px 20px 88px;
}

.headline{
  font-family:'Playfair Display',serif;font-weight:700;
  font-size:clamp(54px,11vw,96px);color:var(--fg);text-align:center;margin-bottom:32px;
  line-height:1;letter-spacing:-.04em;animation:rise .65s .04s cubic-bezier(.16,1,.3,1) both;
  text-shadow:0 2px 36px rgba(109,40,217,.3),0 1px 0 rgba(255,255,255,.09);
}
html:not(.dark) .headline{text-shadow:0 2px 24px rgba(109,40,217,.18);}

.nav{
  position:fixed;top:14px;left:50%;transform:translateX(-50%);
  width:min(calc(100% - 28px),620px);height:54px;border-radius:9999px;
  display:flex;align-items:center;justify-content:space-between;padding:0 10px 0 18px;
  z-index:900;animation:rise .45s cubic-bezier(.16,1,.3,1) both;
}
.brand{
  font-family:'Playfair Display',serif;font-weight:700;font-size:15px;
  color:var(--fg);letter-spacing:-.01em;display:flex;align-items:center;gap:8px;user-select:none;
}
.brand-icon{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--glass-sm);border:1px solid var(--glass-border);
}
.brand-icon svg{width:14px;height:14px;stroke:var(--fg);fill:none;stroke-width:2.2;}
.nav-r{display:flex;align-items:center;gap:6px;position:relative;}

.nbtn{
  width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  background:transparent;color:var(--fg);
  transition:background .18s,transform .2s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color:transparent;
}
.nbtn:hover{background:rgba(255,255,255,.08);}
html:not(.dark) .nbtn:hover{background:rgba(18,16,30,.06);}
.nbtn:active{transform:scale(.84);}
.nbtn svg{width:16px;height:16px;stroke:var(--fg);fill:none;stroke-width:2;}

.pdrop{
  position:absolute;top:48px;right:48px;border-radius:22px;padding:6px;width:162px;
  display:none;flex-direction:column;gap:2px;z-index:910;animation:spring-pop .22s ease;
}
.pdrop.on{display:flex;}
.pdrop button{
  background:none;border:none;text-align:left;padding:10px 15px;border-radius:9999px;
  font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--fg);
  cursor:pointer;transition:background .15s,color .15s;width:100%;-webkit-tap-highlight-color:transparent;
}
.pdrop button:hover{background:var(--drop-hover);color:var(--drop-hover-fg);}

.cap-wrap{width:100%;max-width:620px;margin-bottom:16px;animation:rise .65s .11s cubic-bezier(.16,1,.3,1) both;}
.capsule{height:66px;border-radius:9999px;display:flex;align-items:center;overflow:visible;}
.capsule-inner{
  display:flex;align-items:center;width:100%;height:100%;
  border-radius:9999px;overflow:hidden;position:relative;z-index:1;
}
.cap-ico{flex-shrink:0;padding:0 13px 0 24px;opacity:.35;display:flex;}
.cap-ico svg{width:17px;height:17px;stroke:var(--fg);fill:none;stroke-width:2;}
.url-in{
  flex:1;background:transparent;border:none;outline:none;color:var(--fg);
  font-family:'DM Mono',monospace;font-size:13.5px;font-weight:400;padding:0 8px;min-width:0;
}
.url-in::placeholder{color:var(--ph-color);}
.cap-sep{flex-shrink:0;width:1px;height:30px;background:var(--sep);margin:0 2px;}
.process-btn{
  flex-shrink:0;height:100%;padding:0 30px;background:var(--btn-bg);color:var(--btn-fg);
  border:none;font-family:'DM Mono',monospace;font-size:11px;font-weight:700;
  letter-spacing:.16em;text-transform:uppercase;cursor:pointer;
  border-radius:0 9999px 9999px 0;display:flex;align-items:center;gap:8px;
  transition:opacity .18s,transform .16s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;min-width:120px;justify-content:center;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.25);-webkit-tap-highlight-color:transparent;
}
.process-btn:active{transform:scale(.94);opacity:.88;}
.ldots{display:flex;gap:5px;align-items:center;}
.ldots span{width:5px;height:5px;border-radius:50%;background:currentColor;animation:bounce .55s infinite alternate cubic-bezier(.2,.8,.2,1);}
.ldots span:nth-child(2){animation-delay:.14s;}
.ldots span:nth-child(3){animation-delay:.28s;}

.picker{width:100%;max-width:620px;border-radius:28px;padding:24px 20px 20px;animation:rise .65s .2s cubic-bezier(.16,1,.3,1) both;}
.tabs{display:flex;gap:8px;margin-bottom:16px;justify-content:center;}
.tab{
  height:38px;padding:0 24px;border-radius:9999px;background:var(--tab-idle);
  border:1px solid var(--tab-border);color:var(--tab-text);
  font-family:'DM Mono',monospace;font-size:11.5px;font-weight:600;
  cursor:pointer;transition:all .22s cubic-bezier(.16,1,.3,1);-webkit-tap-highlight-color:transparent;
}
.tab.on{background:var(--btn-bg);color:var(--btn-fg);border-color:transparent;box-shadow:0 2px 14px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.2);}
.pills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:18px;}
.pill{
  padding:8px 22px;border-radius:9999px;background:var(--pill-idle);border:1px solid var(--tab-border);
  color:var(--tab-text);font-family:'DM Mono',monospace;font-size:11px;font-weight:600;
  cursor:pointer;transition:all .22s cubic-bezier(.16,1,.3,1);-webkit-tap-highlight-color:transparent;
}
.pill.on{background:var(--btn-bg);color:var(--btn-fg);border-color:transparent;box-shadow:0 2px 12px rgba(0,0,0,.16);}
.ext-btn{
  width:100%;height:52px;border-radius:9999px;
  background:linear-gradient(135deg,rgba(157,23,77,.88),rgba(109,40,217,.88));
  color:#fff;border:none;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;
  cursor:pointer;display:none;align-items:center;justify-content:center;gap:9px;
  letter-spacing:.1em;text-transform:uppercase;border-top:1px solid rgba(255,255,255,.26);
  box-shadow:0 4px 26px rgba(109,40,217,.32),inset 0 1px 0 rgba(255,255,255,.24);
  transition:opacity .2s,transform .16s cubic-bezier(.34,1.56,.64,1);-webkit-tap-highlight-color:transparent;
}
.ext-btn:hover{opacity:.88;}
.ext-btn:active{transform:scale(.96);}
.ext-btn svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5;}

.dev-toggle{
  position:fixed;bottom:24px;left:24px;z-index:850;width:50px;height:50px;
  border-radius:9999px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--fg);animation:rise .65s .32s cubic-bezier(.16,1,.3,1) both;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1);-webkit-tap-highlight-color:transparent;
}
.dev-toggle:active{transform:scale(.82);}
.dev-toggle .d-ico{
  position:absolute;width:20px;height:20px;stroke:var(--fg);fill:none;stroke-width:2;
  transition:opacity .22s cubic-bezier(.16,1,.3,1),transform .25s cubic-bezier(.34,1.56,.64,1);
}
.dev-toggle .d-ico.mobile{opacity:1;transform:scale(1) rotate(0deg);}
.dev-toggle .d-ico.desktop{opacity:0;transform:scale(.6) rotate(-15deg);}
.dev-toggle.desk .d-ico.mobile{opacity:0;transform:scale(.6) rotate(15deg);}
.dev-toggle.desk .d-ico.desktop{opacity:1;transform:scale(1) rotate(0deg);}

.sbov{
  position:fixed;inset:0;background:rgba(0,0,0,.3);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:800;display:none;
}
.sbov.on{display:block;animation:fade-in .24s ease;}

.sb{
  position:fixed;top:0;left:0;bottom:0;width:min(280px,88vw);
  background:var(--sb-bg);backdrop-filter:blur(60px) saturate(200%);
  -webkit-backdrop-filter:blur(60px) saturate(200%);border-right:1px solid var(--sb-border);
  box-shadow:inset 0 0 0 .5px rgba(255,255,255,.05),6px 0 56px rgba(0,0,0,.45);
  z-index:801;transform:translateX(-100%);transition:transform .34s cubic-bezier(.32,0,.14,1);
  display:flex;flex-direction:column;overflow:hidden;
}
html:not(.dark) .sb{box-shadow:inset 0 0 0 .5px rgba(255,255,255,.4),6px 0 40px rgba(60,40,100,.1);}
.sb.on{transform:translateX(0);}
.sb-hd{
  padding:60px 20px 16px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--sep);
}
.sb-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--fg);letter-spacing:-.015em;}
.sb-close{
  width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;
  background:var(--glass-sm);border:1px solid var(--glass-border);
  display:flex;align-items:center;justify-content:center;color:var(--fg);
  transition:background .16s,transform .2s cubic-bezier(.34,1.56,.64,1);-webkit-tap-highlight-color:transparent;
}
.sb-close:active{transform:scale(.84);}
.sb-close svg{width:14px;height:14px;stroke:var(--fg);fill:none;stroke-width:2.5;}
.sb-body{flex:1;overflow-y:auto;padding:18px 14px;display:flex;flex-direction:column;gap:8px;scrollbar-width:none;}
.sb-body::-webkit-scrollbar{display:none;}

.theme-row{
  display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:56px;
  border-radius:18px;background:var(--glass-sm);border:1px solid var(--glass-border);
  box-shadow:0 2px 0 0 var(--glass-shine) inset;
}
.theme-label{display:flex;align-items:center;gap:12px;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:var(--fg);}
.theme-label svg{width:17px;height:17px;stroke:var(--fg);fill:none;stroke-width:1.8;flex-shrink:0;}
.theme-label .icon-dark{display:block;}
.theme-label .icon-light{display:none;}
html:not(.dark) .theme-label .icon-dark{display:none;}
html:not(.dark) .theme-label .icon-light{display:block;}
.sb-section{font-family:'DM Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg2);padding:6px 4px 2px;}

.tgl{
  width:50px;height:28px;border-radius:9999px;background:var(--tgl-off);border:none;
  position:relative;cursor:pointer;padding:0;transition:background .3s cubic-bezier(.16,1,.3,1);
  flex-shrink:0;-webkit-tap-highlight-color:transparent;
}
.tgl.on{background:#7c3aed;}
html:not(.dark) .tgl.on{background:#5b21b6;}
.tgl-knob{
  position:absolute;top:4px;left:4px;width:20px;height:20px;border-radius:50%;background:#fff;
  box-shadow:0 1px 5px rgba(0,0,0,.28),0 0 0 .5px rgba(0,0,0,.06);
  transition:transform .32s cubic-bezier(.34,1.56,.64,1);
}
.tgl.on .tgl-knob{transform:translateX(22px);}

.panel{
  position:fixed;z-index:3000;border-radius:22px;overflow:hidden;
  display:none;flex-direction:column;background:var(--panel-bg);
  backdrop-filter:blur(52px) saturate(200%);-webkit-backdrop-filter:blur(52px) saturate(200%);
  border:1px solid var(--glass-border);
  box-shadow:inset 0 1.5px 0 0 var(--glass-shine),inset 0 -1px 0 0 rgba(0,0,0,.1),0 28px 70px rgba(0,0,0,.55),0 0 0 .5px rgba(255,255,255,.05);
}
html:not(.dark) .panel{box-shadow:inset 0 1.5px 0 0 var(--glass-shine),0 18px 52px var(--glass-shadow);}
.panel.open{display:flex;animation:spring-pop .28s ease;}
.panel.fs{top:0!important;left:0!important;width:100vw!important;height:100dvh!important;border-radius:0!important;transform:none!important;}
#lpanel{width:268px;height:180px;border-top:1.5px solid rgba(139,92,246,.5);}
#lpanel.ytm{width:320px;height:218px;}
#lpanel.ytm.playing{width:352px;height:234px;}
#bpanel{
  width:330px;height:440px;border-top:1.5px solid rgba(6,182,212,.5);
  transition:width .4s cubic-bezier(.34,1.36,.64,1),height .4s cubic-bezier(.34,1.36,.64,1),border-radius .4s cubic-bezier(.34,1.36,.64,1);
}
#bpanel.mobile-frame{width:210px;height:400px;border-radius:40px;}
#bpanel.desktop-frame{width:440px;height:300px;border-radius:14px;}
#dpanel{width:330px;height:440px;border-top:1.5px solid rgba(236,72,153,.5);}

.pbar{
  height:38px;flex-shrink:0;background:rgba(255,255,255,.03);border-bottom:1px solid var(--sep);
  display:flex;align-items:center;justify-content:space-between;padding:0 12px;
  cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none;
}
.pbar:active{cursor:grabbing;}
.pdot{width:9px;height:9px;border-radius:50%;background:#ff453a;flex-shrink:0;}
.pbtns{display:flex;gap:5px;}
.pbtn{
  width:26px;height:26px;border-radius:9999px;background:var(--pbtn-bg);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--pbtn-fg);
  transition:background .15s,transform .15s cubic-bezier(.34,1.56,.64,1);
  flex-shrink:0;-webkit-tap-highlight-color:transparent;
}
.pbtn:active{transform:scale(.82);}
.pbtn svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;}
.pbtn-txt{font-size:11px;line-height:1;}
.pbody{flex:1;overflow:hidden;position:relative;}
.pw{width:100%;height:100%;position:relative;cursor:pointer;}
.pw img{width:100%;height:100%;object-fit:cover;display:block;}
.pw-ring{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.12);}
.pw-play{
  width:58px;height:58px;border-radius:50%;background:rgba(0,0,0,.52);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1.5px solid rgba(255,255,255,.28);display:flex;align-items:center;justify-content:center;
  transition:transform .24s cubic-bezier(.34,1.56,.64,1),filter .2s;
  box-shadow:0 4px 22px rgba(0,0,0,.38),inset 0 1px 0 rgba(255,255,255,.18);
}
.pw-play:hover{filter:brightness(1.22);transform:scale(1.12);}
.pw-play svg{width:22px;height:22px;fill:#fff;margin-left:4px;}
.puf{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;}
.ifr-wrap{flex:1;overflow:hidden;background:var(--inv-bg);}
.ifr-wrap iframe{width:100%;height:100%;border:none;display:block;}

.mover{
  position:fixed;inset:0;background:rgba(0,0,0,.42);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  z-index:4000;display:none;align-items:center;justify-content:center;padding:20px;
}
.mover.on{display:flex;animation:fade-in .22s ease;}
.mbox{
  position:relative;background:var(--modal-bg);backdrop-filter:blur(60px) saturate(200%);
  -webkit-backdrop-filter:blur(60px) saturate(200%);border:1px solid var(--glass-border);
  border-radius:30px;padding:30px 28px 28px;width:100%;max-width:368px;
  box-shadow:inset 0 1.5px 0 var(--glass-shine),0 30px 80px rgba(0,0,0,.5);animation:spring-pop .24s ease;
}
.m-close{
  position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;
  background:var(--glass-sm);border:1px solid var(--glass-border);cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--fg);
  -webkit-tap-highlight-color:transparent;transition:transform .18s cubic-bezier(.34,1.56,.64,1);
}
.m-close:active{transform:scale(.82);}
.m-close svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5;}
.m-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:20px;color:var(--fg);}
.m-input{
  width:100%;height:46px;background:var(--glass-sm);border:1px solid var(--glass-border);
  border-radius:9999px;padding:0 18px;font-family:'DM Mono',monospace;font-size:12.5px;
  outline:none;margin-bottom:10px;color:var(--fg);box-shadow:0 2px 0 0 var(--glass-shine) inset;
}
textarea.m-input{height:96px;padding:14px 18px;resize:none;border-radius:20px;}
.m-btn{
  width:100%;height:48px;background:var(--btn-bg);color:var(--btn-fg);border:none;
  border-radius:9999px;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;
  cursor:pointer;letter-spacing:.1em;text-transform:uppercase;
  box-shadow:0 2px 14px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.3);
  transition:opacity .2s,transform .16s cubic-bezier(.34,1.56,.64,1);-webkit-tap-highlight-color:transparent;
}
.m-btn:active{transform:scale(.96);opacity:.88;}
.m-pill{
  display:flex;align-items:center;gap:11px;padding:13px 16px;background:var(--glass-sm);
  border:1px solid var(--glass-border);border-radius:9999px;margin-bottom:8px;
  font-size:12px;font-weight:600;color:var(--fg);
}
.m-dot{width:7px;height:7px;background:#a855f7;border-radius:50%;flex-shrink:0;}
.m-text{font-size:12.5px;line-height:1.9;color:var(--fg2);}

.aov{
  position:fixed;inset:0;background:var(--loading-bg);
  backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  z-index:9000;display:none;align-items:center;justify-content:center;
}
.aov.on{display:flex;animation:fade-in .18s ease;}
.adots{display:flex;gap:15px;}
.adots span{width:11px;height:11px;border-radius:50%;animation:bounce .5s infinite alternate cubic-bezier(.2,.8,.2,1);}
.adots span:nth-child(1){background:#a855f7;}
.adots span:nth-child(2){background:#ec4899;animation-delay:.16s;}
.adots span:nth-child(3){background:#38bdf8;animation-delay:.32s;}
</style>
</head>

<script>
'use strict';
var mode='video',currentUrl='',currentPlatform=null,topZ=3000,devMode='mobile',bpanelOpen=false;
var BACKEND_URL='';

document.addEventListener('DOMContentLoaded',function(){
  buildPills();
  setPos('lpanel',window.innerWidth-296,window.innerHeight-224);
  setPos('bpanel',Math.max(8,window.innerWidth-366),90);
  setPos('dpanel',Math.max(8,window.innerWidth-366),90);
  makeDraggable('lbar','lpanel');makeDraggable('bbar','bpanel');makeDraggable('dbar','dpanel');
  document.addEventListener('click',function(e){if(!e.target.closest('.nav-r'))hideDrop();});
  var saved=localStorage.getItem('dl_theme');
  applyTheme(saved!=='light');
});

function applyTheme(dark){
  var tgl=document.getElementById('darkTgl'),lbl=document.getElementById('themeLabel');
  if(dark){document.documentElement.classList.add('dark');tgl.classList.add('on');lbl.textContent='Dark Mode';}
  else{document.documentElement.classList.remove('dark');tgl.classList.remove('on');lbl.textContent='Light Mode';}
}
function toggleTheme(){
  var isDark=document.documentElement.classList.contains('dark');
  applyTheme(!isDark);
  try{localStorage.setItem('dl_theme',!isDark?'dark':'light');}catch(e){}
}

function toggleDev(){
  var btn=document.getElementById('devTgl'),bp=document.getElementById('bpanel');
  if(!bpanelOpen){
    devMode='mobile';btn.classList.remove('desk');
    bp.classList.remove('fs','mobile-frame','desktop-frame');bp.classList.add('mobile-frame');
    if(!document.getElementById('brif').src||document.getElementById('brif').src==='about:blank')
      document.getElementById('brif').src='https://highreach.ai/tools/youtube-video-downloader';
    setPos('bpanel',Math.max(8,window.innerWidth-260),90);
    bp.classList.add('open');bringToFront('bpanel');bpanelOpen=true;
  } else {
    if(devMode==='mobile'){devMode='desktop';btn.classList.add('desk');bp.classList.remove('mobile-frame');bp.classList.add('desktop-frame');}
    else{devMode='mobile';btn.classList.remove('desk');bp.classList.remove('desktop-frame');bp.classList.add('mobile-frame');}
  }
}

function closePanel(id){
  var el=document.getElementById(id);
  el.classList.remove('open','fs','mobile-frame','desktop-frame');
  if(id==='bpanel'){bpanelOpen=false;document.getElementById('devTgl').classList.remove('desk');devMode='mobile';document.getElementById('brif').src='';}
  if(id==='dpanel')document.getElementById('dlif').src='';
  if(id==='lpanel'){el.classList.remove('ytm','playing');document.getElementById('lbody').innerHTML='';document.getElementById('lbtns').innerHTML='';}
}

function toggleDrop(e){e.stopPropagation();document.getElementById('pdrop').classList.toggle('on');}
function hideDrop(){document.getElementById('pdrop').classList.remove('on');}
function openSB(){document.getElementById('sb').classList.add('on');document.getElementById('sbov').classList.add('on');}
function closeSB(){document.getElementById('sb').classList.remove('on');document.getElementById('sbov').classList.remove('on');}

function setMode(m){
  mode=m;
  document.getElementById('tvid').classList.toggle('on',m==='video');
  document.getElementById('taud').classList.toggle('on',m==='audio');
  buildPills();
}
function buildPills(){
  var opts=mode==='video'?['4K','1080p','720p','480p']:['MP3 320k','FLAC','AAC','WAV'];
  var def=mode==='video'?'1080p':'MP3 320k';
  document.getElementById('pills').innerHTML=opts.map(function(q){return '<button class="pill'+(q===def?' on':'')+'" onclick="pickPill(this)">'+q+'</button>';}).join('');
}
function pickPill(el){el.parentElement.querySelectorAll('.pill').forEach(function(p){p.classList.remove('on');});el.classList.add('on');}

function detectPlatform(raw){
  var u=raw.trim(),ph=location.hostname||'localhost';
  var yid=u.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/|v\/|shorts\/))([\w-]{11})/);
  if(yid)return{platform:'youtube',thumb:'https://img.youtube.com/vi/'+yid[1]+'/maxresdefault.jpg',thumbFB:'https://img.youtube.com/vi/'+yid[1]+'/hqdefault.jpg',embed:'https://www.youtube.com/embed/'+yid[1]+'?autoplay=1&rel=0',color:'#ff3b30'};
  var vid=u.match(/vimeo\.com\/(?:.*\/)?(\d+)/);
  if(vid)return{platform:'vimeo',thumb:null,embed:'https://player.vimeo.com/video/'+vid[1]+'?autoplay=1',color:'#1ab7ea',oembed:'https://vimeo.com/api/oembed.json?url='+encodeURIComponent('https://vimeo.com/'+vid[1])};
  var did=u.match(/dailymotion\.com\/video\/([a-zA-Z0-9]+)/)||u.match(/dai\.ly\/([a-zA-Z0-9]+)/);
  if(did)return{platform:'dailymotion',thumb:'https://www.dailymotion.com/thumbnail/video/'+did[1],embed:'https://www.dailymotion.com/embed/video/'+did[1]+'?autoplay=1',color:'#00aaff'};
  var tclip=u.match(/clips\.twitch\.tv\/([A-Za-z0-9_-]+)/)||u.match(/twitch\.tv\/[^/]+\/clip\/([A-Za-z0-9_-]+)/);
  if(tclip)return{platform:'twitch',thumb:null,embed:'https://clips.twitch.tv/embed?clip='+tclip[1]+'&parent='+ph+'&autoplay=true',color:'#9147ff'};
  var tvod=u.match(/twitch\.tv\/videos\/(\d+)/);
  if(tvod)return{platform:'twitch',thumb:null,embed:'https://player.twitch.tv/?video='+tvod[1]+'&parent='+ph+'&autoplay=true',color:'#9147ff'};
  var tlive=u.match(/twitch\.tv\/([A-Za-z0-9_]{3,25})\/?(?:[?#].*)?$/);
  if(tlive&&!/^(videos|directory|p|settings|downloads)$/i.test(tlive[1]))return{platform:'twitch',thumb:'https://static-cdn.jtvnw.net/previews-ttv/live_user_'+tlive[1].toLowerCase()+'-440x248.jpg',embed:'https://player.twitch.tv/?channel='+tlive[1]+'&parent='+ph+'&autoplay=true',color:'#9147ff'};
  var ttid=u.match(/tiktok\.com\/@[\w.-]+\/video\/(\d+)/);
  if(ttid)return{platform:'tiktok',thumb:null,embed:'https://www.tiktok.com/embed/v2/'+ttid[1],color:'#fe2c55',oembed:'https://www.tiktok.com/oembed?url='+encodeURIComponent(u)};
  var igid=u.match(/instagram\.com\/(reel|p|tv)\/([A-Za-z0-9_-]+)/);
  if(igid)return{platform:'instagram',thumb:null,embed:'https://www.instagram.com/'+igid[1]+'/'+igid[2]+'/embed',color:'#e1306c'};
  if(/facebook\.com\/.*\/videos\/|fb\.watch\//.test(u))return{platform:'facebook',thumb:null,embed:'https://www.facebook.com/plugins/video.php?href='+encodeURIComponent(u)+'&show_text=0&autoplay=1',color:'#1877f2'};
  var xid=u.match(/(?:twitter|x)\.com\/[^/]+\/status\/(\d+)/);
  if(xid)return{platform:'twitter',thumb:null,embed:'https://platform.twitter.com/embed/Tweet.html?id='+xid[1],color:'#1c9bf0'};
  if(/soundcloud\.com\//.test(u))return{platform:'soundcloud',thumb:null,embed:'https://w.soundcloud.com/player/?url='+encodeURIComponent(u)+'&auto_play=true&color=%23ff5500',color:'#ff5500'};
  var sid=u.match(/streamable\.com\/([a-zA-Z0-9]+)/);
  if(sid)return{platform:'streamable',thumb:null,embed:'https://streamable.com/e/'+sid[1]+'?autoplay=1',color:'#0f9af0',oembed:'https://api.streamable.com/oembed.json?url='+encodeURIComponent(u)};
  var bvid=u.match(/bilibili\.com\/video\/(BV[a-zA-Z0-9]+)/);
  if(bvid)return{platform:'bilibili',thumb:null,embed:'https://player.bilibili.com/player.html?bvid='+bvid[1]+'&autoplay=1',color:'#00a1d6'};
  var rid=u.match(/rumble\.com\/(v[a-zA-Z0-9]+)-/);
  if(rid)return{platform:'rumble',thumb:null,embed:'https://rumble.com/embed/'+rid[1]+'/',color:'#85c742'};
  var clean=u.split('?')[0].split('#')[0];
  if(/\.(mp4|webm|ogv|mov|m4v|mkv|3gp)$/i.test(clean))return{platform:'direct',thumb:null,direct:{kind:'video',ext:'file'},color:'#34c759'};
  if(/\.(mp3|wav|flac|m4a|aac|opus|oga)$/i.test(clean))return{platform:'direct',thumb:null,direct:{kind:'audio',ext:'file'},color:'#34c759'};
  if(/\.m3u8$/i.test(clean))return{platform:'direct',thumb:null,direct:{kind:'video',ext:'hls'},color:'#34c759'};
  return null;
}
function hexA(hex,a){hex=hex.replace('#','');return 'rgba('+parseInt(hex.slice(0,2),16)+','+parseInt(hex.slice(2,4),16)+','+parseInt(hex.slice(4,6),16)+','+a+')';}
function randomGrad(){var h1=Math.random()*360|0,h2=(h1+70+(Math.random()*130|0))%360,h3=(h2+45+(Math.random()*60|0))%360;return 'radial-gradient(ellipse at '+(Math.random()*100|0)+'% '+(Math.random()*100|0)+'%,hsl('+h1+',62%,50%) 0%,hsl('+h2+',55%,42%) 55%,hsl('+h3+',48%,34%) 100%)';}
function fetchOembed(url){fetch(url).then(function(r){return r.json();}).then(function(d){var b=document.getElementById('pthumb');if(b&&d&&d.thumbnail_url){b.style.backgroundImage='url("'+d.thumbnail_url+'")';b.style.backgroundSize='cover';b.style.backgroundPosition='center';}}).catch(function(){});}

function go(){var raw=document.getElementById('urlIn').value.trim();if(!raw)return;currentUrl=raw;showThumbPanel();document.getElementById('extBtn').style.display='flex';}

var extIcon='<svg viewBox="0 0 24 24" width="11" height="11" stroke="currentColor" fill="none" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>';

function showThumbPanel(){
  var p=document.getElementById('lpanel');p.classList.remove('fs','ytm','playing');
  currentPlatform=detectPlatform(currentUrl);
  if(currentPlatform)renderKnownPanel();else{renderLoadingPanel();tryBackend(currentUrl);}
  p.classList.add('open');bringToFront('lpanel');
}
function renderKnownPanel(){
  var p=document.getElementById('lpanel'),lb=document.getElementById('lbody'),bt=document.getElementById('lbtns'),ld=document.getElementById('ldot');
  p.classList.add('ytm');ld.style.background=currentPlatform.color;
  bt.innerHTML='<button class="pbtn" onclick="toggleFS(\'lpanel\')" title="Fullscreen"><span class="pbtn-txt">⛶</span></button><button class="pbtn" onclick="openUrl()" title="Open">'+extIcon+'</button><button class="pbtn" onclick="closePanel(\'lpanel\')" title="Close"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';
  if(currentPlatform.thumb){lb.innerHTML='<div class="pw" onclick="playEmbed()"><img src="'+currentPlatform.thumb+'"'+(currentPlatform.thumbFB?' onerror="this.onerror=null;this.src=\''+currentPlatform.thumbFB+'\'"':'')+' alt=""><div class="pw-ring"><div class="pw-play" style="background:'+hexA(currentPlatform.color,.52)+'"><svg viewBox="0 0 16 16" fill="white"><polygon points="4,2 14,8 4,14"/></svg></div></div></div>';}
  else{var grad=randomGrad();lb.innerHTML='<div class="pw" id="pthumb" style="background:'+grad+'" onclick="playEmbed()"><div class="pw-ring"><div class="pw-play" style="background:'+hexA(currentPlatform.color,.52)+'"><svg viewBox="0 0 16 16" fill="white"><polygon points="4,2 14,8 4,14"/></svg></div></div></div>';if(currentPlatform.oembed)fetchOembed(currentPlatform.oembed);}
  setPos('lpanel',Math.max(8,window.innerWidth-356),Math.max(8,window.innerHeight-260));
}
function renderLoadingPanel(){
